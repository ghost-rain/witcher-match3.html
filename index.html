@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --gold: #c9a84c;
  --dark-gold: #7a5c1e;
  --blood: #8b1a1a;
  --deep: #0a0a12;
  --panel: #11111e;
  --border: #2e2740;
  --text: #e8d9a0;
  --dim: #6b5f3e;
  --purple: #a040e0;
  --cs: 40px; /* cell size, overridden by JS */
}

* { box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none; user-select: none; }

html { height: 100%; }
body {
  height: 100%; height: 100dvh;
  background: var(--deep);
  color: var(--text);
  font-family: 'Press Start 2P', monospace;
  display: flex; flex-direction: column;
  align-items: center;
  overflow: hidden;
  /* subtle starfield */
  background-image:
    radial-gradient(1px 1px at 12% 18%, #ffffff55 0%, transparent 0%),
    radial-gradient(1px 1px at 38% 8%,  #ffffff44 0%, transparent 0%),
    radial-gradient(1px 1px at 65% 22%, #ffffff66 0%, transparent 0%),
    radial-gradient(1px 1px at 82% 60%, #ffffff33 0%, transparent 0%),
    radial-gradient(1px 1px at 22% 72%, #ffffff44 0%, transparent 0%),
    radial-gradient(1px 1px at 55% 85%, #ffffff33 0%, transparent 0%),
    radial-gradient(1px 1px at 90% 35%, #ffffff44 0%, transparent 0%);
  background-color: var(--deep);
}

/* ─── LAYOUT SHELL ─── */
#app {
  width: 100%;
  max-width: 480px;
  height: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: env(safe-area-inset-top, 6px) 8px env(safe-area-inset-bottom, 6px);
  gap: 0;
  overflow: hidden;
}

/* ─── HEADER ─── */
#hdr {
  flex-shrink: 0;
  text-align: center;
  padding: 6px 0 4px;
  width: 100%;
}
#hdr h1 {
  font-size: clamp(8px, 3.2vw, 13px);
  color: var(--gold);
  text-shadow: 0 0 10px #c9a84c99, 1px 1px 0 #000;
  letter-spacing: 1px;
  white-space: nowrap;
}
#hdr .sub {
  font-size: clamp(5px, 1.6vw, 7px);
  color: var(--dim);
  margin-top: 2px;
  letter-spacing: 1px;
}

/* ─── STATS ROW ─── */
#stats {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  width: 100%;
  padding: 4px 0;
}
.sbox {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 5px 3px 4px;
  text-align: center;
}
.slabel {
  font-size: clamp(4px, 1.2vw, 6px);
  color: var(--dim);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
}
.sval {
  font-size: clamp(10px, 3.5vw, 18px);
  color: #fff;
  text-shadow: 0 0 6px var(--gold);
  line-height: 1;
}
.sval.g { color: var(--gold); }
.sval.p { color: var(--purple); }

.bar {
  height: 5px;
  background: #111;
  border: 1px solid var(--border);
  margin-top: 3px;
  overflow: hidden;
}
.bfill { height: 100%; transition: width 0.3s; }
.bhp { background: linear-gradient(90deg,#6b0000,#cc2222); }
.bxp { background: linear-gradient(90deg,#1a4a00,#3aaa00); }

/* ─── BOARD WRAP ─── */
#bwrap {
  flex-shrink: 0;
  position: relative;
  background: var(--panel);
  border: 2px solid var(--border);
  padding: 5px;
  margin: 4px 0;
}
#bwrap::before, #bwrap::after {
  content: '✦';
  position: absolute;
  color: var(--dark-gold);
  font-size: 8px;
  top: 2px;
  line-height: 1;
}
#bwrap::before { left: 4px; }
#bwrap::after  { right: 4px; }

/* ─── BOARD GRID ─── */
#board {
  display: grid;
  grid-template-columns: repeat(8, var(--cs));
  grid-template-rows:    repeat(8, var(--cs));
  gap: 2px;
  touch-action: none;
}

.cell {
  width: var(--cs); height: var(--cs);
  display: flex; align-items: center; justify-content: center;
  background: #0c0c1a;
  border: 1px solid #181830;
  font-size: calc(var(--cs) * 0.58);
  transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
  cursor: pointer;
  will-change: transform;
  line-height: 1;
}
.cell.sel {
  background: #1c1830;
  border-color: var(--gold);
  box-shadow: 0 0 8px var(--gold), inset 0 0 4px rgba(201,168,76,0.2);
  transform: scale(1.12);
  z-index: 2;
}
.cell.boom   { animation: boom 0.33s ease-out forwards; }
.cell.dropin { animation: dropin 0.22s ease-out; }
.cell.nope   { animation: nope 0.22s; }

@keyframes boom {
  0%   { transform:scale(1.2); background:rgba(255,210,60,.45); opacity:1; }
  55%  { transform:scale(.5);  opacity:.5; }
  100% { transform:scale(0);   opacity:0; }
}
@keyframes dropin {
  from { transform:translateY(-32px); opacity:0; }
  to   { transform:translateY(0);     opacity:1; }
}
@keyframes nope {
  0%,100% { transform:translateX(0); }
  25%  { transform:translateX(-4px); }
  75%  { transform:translateX(4px); }
}

/* overlay */
#msg {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(8px, 2.5vw, 12px);
  color: var(--gold);
  text-shadow: 0 0 12px var(--gold), 2px 2px 0 #000;
  background: rgba(0,0,0,.6);
  pointer-events: none;
  opacity: 0; transition: opacity .3s;
  letter-spacing: 1px; text-align: center; z-index: 5;
  padding: 8px;
}
#msg.on { opacity: 1; }

/* ─── COMBO ─── */
#combo {
  flex-shrink: 0;
  height: 20px;
  text-align: center;
  font-size: clamp(7px, 2.2vw, 10px);
  color: var(--gold);
  text-shadow: 0 0 8px var(--gold);
  opacity: 0; transition: opacity .4s;
  line-height: 20px;
}
#combo.on { opacity: 1; }

/* ─── NEW GAME BTN ─── */
#btnNew {
  flex-shrink: 0;
  width: 100%;
  padding: 10px 4px;
  background: #0c0c1a;
  border: 2px solid var(--dark-gold);
  color: var(--gold);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(6px, 2vw, 9px);
  cursor: pointer;
  letter-spacing: 1px;
  transition: background .15s, box-shadow .15s;
  margin-top: 2px;
}
#btnNew:active {
  background: #1a1428;
  box-shadow: 0 0 10px var(--dark-gold);
  border-color: var(--gold);
}

/* ─── GAME OVER ─── */
#go {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.92);
  z-index: 200;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; text-align: center; padding: 24px;
}
#go.on { display: flex; }
#go .skull { font-size: clamp(24px,8vw,40px); }
#go h2 {
  font-size: clamp(11px,4vw,18px);
  color: var(--blood);
  text-shadow: 0 0 20px #ff0000;
}
#go .fs {
  font-size: clamp(8px,2.5vw,12px);
  color: var(--gold);
}
#go .qt {
  font-size: clamp(5px,1.6vw,7px);
  color: var(--dim);
  max-width: 300px; line-height: 2;
}
#go button {
  padding: 12px 20px;
  background: #0c0c1a;
  border: 2px solid var(--dark-gold);
  color: var(--gold);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(6px,2vw,9px);
  cursor: pointer; letter-spacing: 1px;
}
#go button:active { background: #1a1428; }
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <h1>⚔ ГЕРАЛЬТ: ЗНАКИ СУДЬБЫ ⚔</h1>
    <div class="sub">witcher match-3 · 8-bit</div>
  </div>

  <div id="stats">
    <div class="sbox">
      <div class="slabel">ОРЕНЫ</div>
      <div class="sval g" id="sScore">0</div>
    </div>
    <div class="sbox">
      <div class="slabel">ХОДЫ</div>
      <div class="sval g" id="sMoves">30</div>
    </div>
    <div class="sbox">
      <div class="slabel">УРОВЕНЬ</div>
      <div class="sval p" id="sLevel">1</div>
    </div>
    <div class="sbox">
      <div class="slabel">ЖИЗНИ</div>
      <div class="sval" id="sHp">10</div>
      <div class="bar"><div class="bfill bhp" id="bHp" style="width:100%"></div></div>
      <div class="bar" style="margin-top:2px;"><div class="bfill bxp" id="bXp" style="width:0%"></div></div>
    </div>
  </div>

  <div id="bwrap">
    <div id="board"></div>
    <div id="msg"></div>
  </div>

  <div id="combo"></div>
  <button id="btnNew" onclick="newGame()">⚔ НОВАЯ ИГРА</button>
</div>

<div id="go">
  <div class="skull">☠</div>
  <h2>ГЕРАЛЬТ ПАЛ</h2>
  <div class="fs">Итог: <span id="goScore">0</span> оренов</div>
  <div class="qt" id="goQt"></div>
  <button onclick="newGame()">⚔ СЫГРАТЬ СНОВА</button>
</div>

<script>
const COLS=8,ROWS=8;
const SYM=['🔥','⚡','🛡️','🌿','💜','⚔️','🐺','💰'];
const QUOTES=[
  '"Зло существует. В мире и в каждом из нас."',
  '"Нейтралитет — это иллюзия."',
  '"Жизнь коротка. Наслаждайся ею сейчас."',
  '"Ведьмак умрёт от меча — рано или поздно."',
  '"Мир был бы лучше без людей."',
];

let board=[], sel=null, score=0, moves=30;
let hp=10, maxHp=10, xp=0, level=1, xpNext=300;
let busy=false, combo=0;

// ─── CELL SIZE ───
function resize(){
  const app=document.getElementById('app');
  const aw=app.clientWidth - 16; // padding 8px each side
  // measure non-board heights
  const hdr=document.getElementById('hdr').offsetHeight;
  const stats=document.getElementById('stats').offsetHeight;
  const cmb=document.getElementById('combo').offsetHeight;
  const btn=document.getElementById('btnNew').offsetHeight;
  const gaps=4+4+4+2+2; // various gaps
  const bpad=10+4; // bwrap padding+border
  const avh=app.clientHeight - hdr - stats - cmb - btn - gaps - bpad - 8;
  const avw=aw - bpad;
  const byH=Math.floor((avh-2*7)/8);
  const byW=Math.floor((avw-2*7)/8);
  const cs=Math.max(24,Math.min(byH,byW,58));
  document.documentElement.style.setProperty('--cs',cs+'px');
}

// ─── HELPERS ───
const rnd=n=>Math.floor(Math.random()*n);
const rsym=()=>rnd(SYM.length);
const delay=ms=>new Promise(r=>setTimeout(r,ms));
const $=id=>document.getElementById(id);
function gcell(r,c){return document.querySelector(`#board .cell[data-r="${r}"][data-c="${c}"]`);}

// ─── INIT ───
function newGame(){
  $('go').classList.remove('on');
  score=0;moves=30;hp=maxHp=10;xp=0;level=1;xpNext=300;
  sel=null;busy=false;combo=0;
  board=Array.from({length:ROWS},()=>Array.from({length:COLS},rsym));
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      while(initMatch(r,c)) board[r][c]=rsym();
  render();ui();
}

function initMatch(r,c){
  const v=board[r][c];
  if(c>=2&&board[r][c-1]===v&&board[r][c-2]===v)return true;
  if(r>=2&&board[r-1][c]===v&&board[r-2][c]===v)return true;
  return false;
}

// ─── RENDER ───
function render(){
  const el=$('board');
  el.innerHTML='';
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const d=document.createElement('div');
      d.className='cell';
      d.dataset.r=r; d.dataset.c=c;
      d.textContent=(board[r][c]!==null)?SYM[board[r][c]]:'';
      if(sel&&sel[0]===r&&sel[1]===c) d.classList.add('sel');
      el.appendChild(d);
    }
  }
}

// ─── TOUCH/POINTER INPUT ───
let ptDown=null, swipeR=null, swipeC=null;

$('board').addEventListener('pointerdown',e=>{
  e.preventDefault();
  const cell=e.target.closest('.cell');
  if(!cell)return;
  ptDown={r:+cell.dataset.r, c:+cell.dataset.c, x:e.clientX, y:e.clientY};
},{passive:false});

$('board').addEventListener('pointermove',e=>{
  // nothing needed — handled on pointerup
},{passive:true});

$('board').addEventListener('pointerup',e=>{
  if(!ptDown)return;
  e.preventDefault();
  const dx=e.clientX-ptDown.x, dy=e.clientY-ptDown.y;
  const dist=Math.hypot(dx,dy);
  const {r,c}=ptDown;
  ptDown=null;

  if(dist<10){
    // tap
    onTap(r,c);
    return;
  }
  // swipe
  let tr=r,tc=c;
  if(Math.abs(dx)>Math.abs(dy)) tc+=dx>0?1:-1;
  else tr+=dy>0?1:-1;
  tr=Math.max(0,Math.min(ROWS-1,tr));
  tc=Math.max(0,Math.min(COLS-1,tc));
  if(tr!==r||tc!==c){ sel=null; doSwap(r,c,tr,tc); }
},{passive:false});

$('board').addEventListener('pointercancel',()=>{ ptDown=null; });

function onTap(r,c){
  if(busy||moves<=0)return;
  if(!sel){sel=[r,c];render();return;}
  const[sr,sc]=sel;
  if(sr===r&&sc===c){sel=null;render();return;}
  if(Math.abs(sr-r)+Math.abs(sc-c)!==1){sel=[r,c];render();return;}
  sel=null;
  doSwap(sr,sc,r,c);
}

// ─── SWAP ───
async function doSwap(r1,c1,r2,c2){
  if(busy)return;
  busy=true;
  let t=board[r1][c1]; board[r1][c1]=board[r2][c2]; board[r2][c2]=t;
  render();
  const m=findMatches();
  if(m.length===0){
    await delay(100);
    t=board[r1][c1]; board[r1][c1]=board[r2][c2]; board[r2][c2]=t;
    render();
    [gcell(r1,c1),gcell(r2,c2)].forEach(el=>{
      if(el){el.classList.add('nope');setTimeout(()=>el.classList.remove('nope'),260);}
    });
    moves--; ui(); busy=false;
    if(moves<=0) endGame();
    return;
  }
  combo=0; moves--; ui();
  await processMatches();
  busy=false;
  if(moves<=0) endGame();
}

// ─── MATCH PROCESSING ───
async function processMatches(){
  let m=findMatches();
  while(m.length>0){
    combo++;
    const pts=m.length*10*combo;
    score+=pts; xp+=pts;
    showCombo(combo,pts);
    m.forEach(([r,c])=>{
      const el=gcell(r,c);
      if(el) el.classList.add('boom');
      board[r][c]=null;
    });
    await delay(360);
    await drop();
    await delay(100);
    render();
    levelUp(); ui();
    m=findMatches();
  }
  hideCombo();
}

function findMatches(){
  const set=new Set();
  // horizontal
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS-2;c++){
      const v=board[r][c];
      if(v===null)continue;
      if(board[r][c+1]===v&&board[r][c+2]===v){
        let l=3;while(c+l<COLS&&board[r][c+l]===v)l++;
        for(let i=0;i<l;i++)set.add(`${r},${c+i}`);
      }
    }
  // vertical
  for(let c=0;c<COLS;c++)
    for(let r=0;r<ROWS-2;r++){
      const v=board[r][c];
      if(v===null)continue;
      if(board[r+1][c]===v&&board[r+2][c]===v){
        let l=3;while(r+l<ROWS&&board[r+l][c]===v)l++;
        for(let i=0;i<l;i++)set.add(`${r+i},${c}`);
      }
    }
  return[...set].map(k=>k.split(',').map(Number));
}

async function drop(){
  for(let c=0;c<COLS;c++){
    let empty=[];
    for(let r=ROWS-1;r>=0;r--){
      if(board[r][c]===null) empty.push(r);
      else if(empty.length){board[empty.shift()][c]=board[r][c];board[r][c]=null;empty.push(r);}
    }
    for(const r of empty) board[r][c]=rsym();
  }
}

function levelUp(){
  while(xp>=xpNext){
    xp-=xpNext; level++;
    xpNext=Math.floor(xpNext*1.4);
    maxHp+=2; hp=maxHp; moves+=10;
    showMsg(`✦ УРОВЕНЬ ${level}! ✦`);
  }
}

// ─── UI ───
function ui(){
  $('sScore').textContent=score;
  $('sMoves').textContent=moves;
  $('sLevel').textContent=level;
  $('sHp').textContent=`${hp}/${maxHp}`;
  $('bHp').style.width=(hp/maxHp*100)+'%';
  $('bXp').style.width=(xp/xpNext*100)+'%';
}

function showMsg(txt,dur=1300){
  const el=$('msg');
  el.textContent=txt; el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),dur);
}

function showCombo(n,pts){
  const el=$('combo');
  el.textContent=n>=2?`× ${n} COMBO  +${pts}`:`+${pts}`;
  el.classList.add('on');
}
function hideCombo(){
  setTimeout(()=>$('combo').classList.remove('on'),900);
}

function endGame(){
  $('goScore').textContent=score;
